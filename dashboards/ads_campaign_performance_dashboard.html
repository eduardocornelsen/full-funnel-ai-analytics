<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paid Campaign Performance Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d1a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0d0d1a; }
  ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {
  LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
  ResponsiveContainer, ScatterChart, Scatter, ZAxis, Cell
} = Recharts;

/* ── PALETTE ───────────────────────────────────────────── */
const BLUE   = '#60a5fa';
const CORAL  = '#f87171';
const AMBER  = '#fbbf24';
const GREEN  = '#34d399';
const MUTED  = '#94a3b8';
const DIM    = '#64748b';
const CARD_BG   = '#1a1a2e';
const CARD_BORDER = '#2a2a4a';

/* ── RAW DATA ──────────────────────────────────────────── */
const googleCampaigns = [
  { id:'C001', name:'Brand - Olist',           platform:'Google', type:'SEARCH',   impressions:458240,  clicks:16364, spend:12644.89, conversions:437, ctr:3.571, cvr:2.670, roas:3.46, budget:15000 },
  { id:'C002', name:'Generic - Electronics',   platform:'Google', type:'SEARCH',   impressions:443271,  clicks:15521, spend:14769.76, conversions:431, ctr:3.501, cvr:2.777, roas:2.92, budget:17000 },
  { id:'C003', name:'Generic - Home & Garden', platform:'Google', type:'SEARCH',   impressions:447152,  clicks:15396, spend:14255.40, conversions:403, ctr:3.443, cvr:2.617, roas:2.83, budget:16500 },
  { id:'C004', name:'Shopping - All Products', platform:'Google', type:'SHOPPING', impressions:706130,  clicks:14297, spend:7111.43,  conversions:307, ctr:2.025, cvr:2.147, roas:4.32, budget:8500  },
  { id:'C005', name:'Display - Retargeting',   platform:'Google', type:'DISPLAY',  impressions:1773449, clicks:8859,  spend:2469.85,  conversions:25,  ctr:0.500, cvr:0.282, roas:1.01, budget:3500  },
  { id:'C006', name:'YouTube - Brand Awareness',platform:'Google',type:'VIDEO',    impressions:1296667, clicks:15486, spend:2609.07,  conversions:3,   ctr:1.194, cvr:0.019, roas:0.11, budget:4000  },
];

const metaCampaigns = [
  { id:'META_C001', name:'Prospecting - Lookalike',     platform:'Meta', type:'CONVERSIONS',  impressions:1755731, clicks:29368, spend:14048.67, conversions:1094, ctr:1.672, cvr:3.726, roas:7.79,  budget:16000 },
  { id:'META_C002', name:'Retargeting - Add to Cart',   platform:'Meta', type:'CONVERSIONS',  impressions:1737060, clicks:29087, spend:10529.67, conversions:1047, ctr:1.675, cvr:3.599, roas:9.94,  budget:12000 },
  { id:'META_C003', name:'Brand Awareness - Video',     platform:'Meta', type:'AWARENESS',    impressions:1645980, clicks:27008, spend:8132.07,  conversions:828,  ctr:1.641, cvr:3.066, roas:10.18, budget:10000 },
  { id:'META_C004', name:'Catalog Sales - Dynamic',     platform:'Meta', type:'CATALOG_SALES',impressions:1632333, clicks:26945, spend:13544.25, conversions:839,  ctr:1.650, cvr:3.115, roas:6.19,  budget:15500 },
  { id:'META_C005', name:'Instagram Stories - Flash',   platform:'Meta', type:'CONVERSIONS',  impressions:1799772, clicks:30003, spend:12957.60, conversions:943,  ctr:1.667, cvr:3.143, roas:7.28,  budget:15000 },
];

// Weekly spend trend (Dec 16 2025 – Mar 16 2026 · 13 weeks)
// Google sum ≈ $53,850  |  Meta sum ≈ $58,210
const weeklyTrend = [
  { week:'Dec W1', google:3820, meta:4120 },
  { week:'Dec W2', google:3650, meta:3980 },
  { week:'Dec W3', google:3920, meta:4380 },
  { week:'Dec W4', google:4250, meta:4620 },
  { week:'Jan W1', google:4080, meta:4490 },
  { week:'Jan W2', google:4310, meta:4750 },
  { week:'Jan W3', google:4180, meta:4580 },
  { week:'Jan W4', google:4420, meta:4820 },
  { week:'Feb W1', google:4290, meta:4660 },
  { week:'Feb W2', google:4530, meta:4980 },
  { week:'Feb W3', google:4180, meta:4550 },
  { week:'Feb W4', google:4670, meta:5120 },
  { week:'Mar W1', google:3550, meta:3160 },
];

/* ── FORMATTERS ────────────────────────────────────────── */
const fmt$ = v =>
  '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
const fmtPct  = v => `${Number(v).toFixed(2)}%`;
const fmtROAS = v => `${Number(v).toFixed(2)}x`;
const fmtNum  = v => Number(v).toLocaleString('en-US');

/* ── CUSTOM TOOLTIPS ───────────────────────────────────── */
function LineTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: '#111827', border: `1px solid ${CARD_BORDER}`, borderRadius: 8, padding: '10px 14px', fontSize: 12 }}>
      <div style={{ fontWeight: 600, color: '#fff', marginBottom: 6 }}>{label}</div>
      {payload.map(p => (
        <div key={p.dataKey} style={{ color: p.color, marginBottom: 2 }}>
          {p.name}: {fmt$(p.value)}
        </div>
      ))}
    </div>
  );
}

function ScatterTooltip({ active, payload }) {
  if (!active || !payload?.length) return null;
  const d = payload[0]?.payload;
  if (!d) return null;
  return (
    <div style={{ background: '#111827', border: `1px solid ${CARD_BORDER}`, borderRadius: 8, padding: '10px 14px', fontSize: 12, maxWidth: 200 }}>
      <div style={{ fontWeight: 600, color: '#fff', marginBottom: 4, lineHeight: 1.3 }}>{d.name}</div>
      <div style={{ color: d.platform === 'Google' ? BLUE : CORAL, marginBottom: 6, fontSize: 11 }}>{d.platform}</div>
      <div style={{ color: MUTED }}>CTR: <span style={{ color: '#fff' }}>{fmtPct(d.ctr)}</span></div>
      <div style={{ color: MUTED }}>CVR: <span style={{ color: '#fff' }}>{fmtPct(d.cvr)}</span></div>
      <div style={{ color: MUTED }}>Spend: <span style={{ color: '#fff' }}>{fmt$(d.spend)}</span></div>
      <div style={{ color: MUTED }}>ROAS: <span style={{ color: d.roas > 3 ? GREEN : d.roas < 1 ? CORAL : AMBER }}>{fmtROAS(d.roas)}</span></div>
    </div>
  );
}

/* ── SHARED CARD STYLE ─────────────────────────────────── */
const cardStyle = (extra = {}) => ({
  background: CARD_BG,
  borderRadius: 12,
  border: `1px solid ${CARD_BORDER}`,
  padding: 20,
  ...extra,
});

const sectionTitle = {
  fontSize: 11,
  fontWeight: 600,
  color: DIM,
  textTransform: 'uppercase',
  letterSpacing: '0.07em',
  marginBottom: 14,
};

/* ── MAIN COMPONENT ────────────────────────────────────── */
function CampaignDashboard() {
  const allCampaigns = [...googleCampaigns, ...metaCampaigns]
    .sort((a, b) => b.roas - a.roas);

  const gTotals = {
    spend:       googleCampaigns.reduce((s, c) => s + c.spend, 0),
    clicks:      googleCampaigns.reduce((s, c) => s + c.clicks, 0),
    conversions: googleCampaigns.reduce((s, c) => s + c.conversions, 0),
    roas: 2.98,
  };
  const mTotals = {
    spend:       metaCampaigns.reduce((s, c) => s + c.spend, 0),
    clicks:      metaCampaigns.reduce((s, c) => s + c.clicks, 0),
    conversions: metaCampaigns.reduce((s, c) => s + c.conversions, 0),
    roas: 8.02,
  };

  const scatterData = allCampaigns.map(c => ({
    name: c.name, platform: c.platform,
    ctr: c.ctr, cvr: c.cvr, spend: c.spend, roas: c.roas,
  }));

  const toScale = allCampaigns.filter(c => c.roas > 3);
  const toPause = allCampaigns.filter(c => c.roas < 1);

  /* ── PLATFORM CARDS ── */
  const platforms = [
    { label: 'Google Ads', data: gTotals, color: BLUE  },
    { label: 'Meta Ads',   data: mTotals, color: CORAL },
  ];

  const roasColor = v => v > 3 ? GREEN : v < 1 ? CORAL : AMBER;

  return (
    <div style={{ background: '#0d0d1a', minHeight: '100vh', padding: '24px 28px' }}>

      {/* ── HEADER ── */}
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontSize: 22, fontWeight: 700, color: '#fff', margin: 0 }}>
          Paid Campaign Performance
        </h1>
        <p style={{ fontSize: 13, color: DIM, marginTop: 4 }}>
          Dec 16, 2025 – Mar 16, 2026 &nbsp;·&nbsp; Google Ads &amp; Meta Ads &nbsp;·&nbsp; 90-day period
        </p>
      </div>

      {/* ── PLATFORM COMPARISON CARDS ── */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 20 }}>
        {platforms.map(({ label, data, color }) => (
          <div key={label} style={cardStyle()}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 18 }}>
              <div style={{ width: 10, height: 10, borderRadius: '50%', background: color, flexShrink: 0 }}/>
              <span style={{ fontWeight: 700, fontSize: 15, color: '#fff' }}>{label}</span>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
              {[
                { label: 'Total Spend',  value: fmt$(data.spend),                 hi: false },
                { label: 'Clicks',       value: fmtNum(data.clicks),              hi: false },
                { label: 'Conversions',  value: fmtNum(data.conversions),         hi: false },
                { label: 'ROAS',         value: fmtROAS(data.roas),               hi: true  },
              ].map(({ label: l, value, hi }) => (
                <div key={l}>
                  <div style={{ fontSize: 10, color: DIM, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 5 }}>{l}</div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: hi ? color : '#fff', lineHeight: 1 }}>{value}</div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* ── CHARTS ROW ── */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 20 }}>

        {/* Weekly Spend Trend */}
        <div style={cardStyle()}>
          <div style={sectionTitle}>Weekly Spend Trend</div>
          <ResponsiveContainer width="100%" height={210}>
            <LineChart data={weeklyTrend} margin={{ top: 4, right: 8, bottom: 4, left: 0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e1e38" vertical={false}/>
              <XAxis
                dataKey="week"
                tick={{ fill: DIM, fontSize: 10 }}
                axisLine={{ stroke: CARD_BORDER }}
                tickLine={false}
                interval={2}
              />
              <YAxis
                tick={{ fill: DIM, fontSize: 10 }}
                axisLine={false}
                tickLine={false}
                tickFormatter={v => `$${(v/1000).toFixed(0)}k`}
                width={36}
              />
              <Tooltip content={<LineTooltip />}/>
              <Legend
                wrapperStyle={{ fontSize: 12, paddingTop: 10, color: MUTED }}
                iconType="plainline"
                iconSize={16}
              />
              <Line type="monotone" dataKey="google" name="Google" stroke={BLUE}  strokeWidth={2} dot={false} activeDot={{ r: 4, fill: BLUE }}/>
              <Line type="monotone" dataKey="meta"   name="Meta"   stroke={CORAL} strokeWidth={2} dot={false} activeDot={{ r: 4, fill: CORAL }}/>
            </LineChart>
          </ResponsiveContainer>
        </div>

        {/* CTR vs CVR Scatter */}
        <div style={cardStyle()}>
          <div style={sectionTitle}>CTR vs CVR — One Dot per Campaign</div>
          <ResponsiveContainer width="100%" height={210}>
            <ScatterChart margin={{ top: 4, right: 16, bottom: 18, left: 0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e1e38"/>
              <XAxis
                type="number" dataKey="ctr" name="CTR" unit="%"
                tick={{ fill: DIM, fontSize: 10 }}
                axisLine={{ stroke: CARD_BORDER }}
                tickLine={false}
                label={{ value: 'CTR (%)', position: 'insideBottom', offset: -12, fill: DIM, fontSize: 10 }}
              />
              <YAxis
                type="number" dataKey="cvr" name="CVR" unit="%"
                tick={{ fill: DIM, fontSize: 10 }}
                axisLine={false}
                tickLine={false}
                width={36}
                label={{ value: 'CVR (%)', angle: -90, position: 'insideLeft', offset: 12, fill: DIM, fontSize: 10 }}
              />
              <ZAxis type="number" dataKey="spend" range={[50, 500]}/>
              <Tooltip content={<ScatterTooltip />}/>
              <Scatter data={scatterData} name="Campaigns">
                {scatterData.map((entry, i) => (
                  <Cell
                    key={i}
                    fill={entry.platform === 'Google' ? BLUE : CORAL}
                    fillOpacity={0.82}
                    stroke={entry.platform === 'Google' ? BLUE : CORAL}
                    strokeOpacity={0.4}
                    strokeWidth={1}
                  />
                ))}
              </Scatter>
            </ScatterChart>
          </ResponsiveContainer>
          <div style={{ display: 'flex', gap: 20, justifyContent: 'center', marginTop: 2 }}>
            {[['Google', BLUE], ['Meta', CORAL]].map(([name, c]) => (
              <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: MUTED }}>
                <div style={{ width: 9, height: 9, borderRadius: '50%', background: c }}/>
                {name}
              </div>
            ))}
            <div style={{ fontSize: 11, color: DIM }}>· bubble size = spend</div>
          </div>
        </div>
      </div>

      {/* ── CAMPAIGN TABLE ── */}
      <div style={{ ...cardStyle(), marginBottom: 20 }}>
        <div style={sectionTitle}>All Campaigns — Sorted by ROAS</div>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ borderBottom: `1px solid ${CARD_BORDER}` }}>
                {['Campaign', 'Platform', 'Type', 'Spend', 'Clicks', 'CTR', 'Conversions', 'CVR', 'ROAS'].map(h => (
                  <th key={h} style={{
                    padding: '8px 12px',
                    textAlign: h === 'Campaign' ? 'left' : 'right',
                    color: DIM, fontWeight: 500, fontSize: 10,
                    textTransform: 'uppercase', letterSpacing: '0.06em',
                    whiteSpace: 'nowrap',
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {allCampaigns.map((c, i) => (
                <tr
                  key={c.id}
                  style={{
                    borderBottom: `1px solid #16162a`,
                    background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.012)',
                  }}
                >
                  <td style={{ padding: '10px 12px', color: '#e2e8f0', fontWeight: 500, whiteSpace: 'nowrap' }}>{c.name}</td>
                  <td style={{ padding: '10px 12px', textAlign: 'right' }}>
                    <span style={{
                      background: c.platform === 'Google' ? 'rgba(96,165,250,0.12)' : 'rgba(248,113,113,0.12)',
                      color: c.platform === 'Google' ? BLUE : CORAL,
                      borderRadius: 4, padding: '2px 8px', fontSize: 11, whiteSpace: 'nowrap',
                    }}>
                      {c.platform}
                    </span>
                  </td>
                  <td style={{ padding: '10px 12px', textAlign: 'right', color: DIM, fontSize: 11, whiteSpace: 'nowrap' }}>{c.type}</td>
                  <td style={{ padding: '10px 12px', textAlign: 'right', color: '#e2e8f0' }}>{fmt$(c.spend)}</td>
                  <td style={{ padding: '10px 12px', textAlign: 'right', color: MUTED }}>{fmtNum(c.clicks)}</td>
                  <td style={{ padding: '10px 12px', textAlign: 'right', color: MUTED }}>{fmtPct(c.ctr)}</td>
                  <td style={{ padding: '10px 12px', textAlign: 'right', color: '#e2e8f0' }}>{fmtNum(c.conversions)}</td>
                  <td style={{ padding: '10px 12px', textAlign: 'right', color: MUTED }}>{fmtPct(c.cvr)}</td>
                  <td style={{ padding: '10px 12px', textAlign: 'right', fontWeight: 700, color: roasColor(c.roas), fontSize: 14 }}>
                    {fmtROAS(c.roas)}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* ── BUDGET PACING ── */}
      <div style={{ ...cardStyle(), marginBottom: 20 }}>
        <div style={sectionTitle}>Budget Pacing — 90-Day Period</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {[...allCampaigns].sort((a, b) => (b.spend / b.budget) - (a.spend / a.budget)).map(c => {
            const pct = Math.min((c.spend / c.budget) * 100, 100);
            const barColor = c.platform === 'Google' ? BLUE : CORAL;
            const pctColor = pct > 92 ? AMBER : pct < 75 ? CORAL : GREEN;
            return (
              <div key={c.id}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 5 }}>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'center', minWidth: 0 }}>
                    <div style={{ width: 7, height: 7, borderRadius: '50%', background: barColor, flexShrink: 0 }}/>
                    <span style={{ fontSize: 12, color: '#e2e8f0', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                      {c.name}
                    </span>
                    <span style={{
                      fontSize: 10, color: c.platform === 'Google' ? BLUE : CORAL,
                      background: c.platform === 'Google' ? 'rgba(96,165,250,0.1)' : 'rgba(248,113,113,0.1)',
                      borderRadius: 3, padding: '1px 5px', flexShrink: 0,
                    }}>{c.platform}</span>
                  </div>
                  <div style={{ display: 'flex', gap: 16, alignItems: 'center', flexShrink: 0, marginLeft: 12 }}>
                    <span style={{ fontSize: 11, color: DIM }}>
                      {fmt$(c.spend)} <span style={{ color: '#3d3d5c' }}>/</span> {fmt$(c.budget)}
                    </span>
                    <span style={{ fontSize: 12, fontWeight: 700, color: pctColor, minWidth: 36, textAlign: 'right' }}>
                      {pct.toFixed(0)}%
                    </span>
                  </div>
                </div>
                <div style={{ background: '#0d0d1a', borderRadius: 6, height: 7, overflow: 'hidden' }}>
                  <div style={{
                    width: `${pct}%`, height: '100%',
                    background: `linear-gradient(90deg, ${barColor}bb, ${barColor})`,
                    borderRadius: 6,
                    transition: 'width 0.6s ease',
                  }}/>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ display: 'flex', gap: 20, marginTop: 14, fontSize: 11 }}>
          {[
            { dot: GREEN, label: 'On pace (75–92%)' },
            { dot: AMBER, label: 'Near cap (>92%)' },
            { dot: CORAL, label: 'Underpacing (<75%)' },
          ].map(({ dot, label }) => (
            <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 5, color: DIM }}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: dot }}/>
              {label}
            </div>
          ))}
        </div>
      </div>

      {/* ── RECOMMENDATIONS ── */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>

        {/* Scale */}
        <div style={{ ...cardStyle({ border: `1px solid rgba(52,211,153,0.25)`, background: 'rgba(52,211,153,0.04)' }) }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: GREEN }}/>
            <span style={{ fontWeight: 700, fontSize: 14, color: GREEN }}>Scale — ROAS &gt; 3x</span>
            <span style={{ marginLeft: 'auto', background: 'rgba(52,211,153,0.15)', color: GREEN, borderRadius: 20, padding: '2px 10px', fontSize: 11, fontWeight: 600 }}>
              {toScale.length} campaigns
            </span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {toScale.map(c => (
              <div key={c.id} style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                background: 'rgba(52,211,153,0.07)', borderRadius: 8, padding: '9px 12px',
              }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: '#e2e8f0' }}>{c.name}</div>
                  <div style={{ fontSize: 11, color: c.platform === 'Google' ? BLUE : CORAL, marginTop: 2 }}>
                    {c.platform} · {c.type} · Spend {fmt$(c.spend)}
                  </div>
                </div>
                <div style={{ fontSize: 18, fontWeight: 800, color: GREEN, flexShrink: 0, marginLeft: 12 }}>
                  {fmtROAS(c.roas)}
                </div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 12, fontSize: 11, color: DIM, lineHeight: 1.5 }}>
            Increase daily budgets by 20–40% for campaigns above 5x ROAS. Meta dominates — allocate incremental spend there first.
          </div>
        </div>

        {/* Pause */}
        <div style={{ ...cardStyle({ border: `1px solid rgba(248,113,113,0.25)`, background: 'rgba(248,113,113,0.04)' }) }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: CORAL }}/>
            <span style={{ fontWeight: 700, fontSize: 14, color: CORAL }}>Pause — ROAS &lt; 1x</span>
            <span style={{ marginLeft: 'auto', background: 'rgba(248,113,113,0.15)', color: CORAL, borderRadius: 20, padding: '2px 10px', fontSize: 11, fontWeight: 600 }}>
              {toPause.length} campaign{toPause.length !== 1 ? 's' : ''}
            </span>
          </div>
          {toPause.length === 0 ? (
            <div style={{ color: DIM, fontSize: 12, padding: '8px 0' }}>No campaigns below 1x ROAS.</div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {toPause.map(c => (
                <div key={c.id} style={{
                  display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                  background: 'rgba(248,113,113,0.08)', borderRadius: 8, padding: '9px 12px',
                }}>
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 600, color: '#e2e8f0' }}>{c.name}</div>
                    <div style={{ fontSize: 11, color: c.platform === 'Google' ? BLUE : CORAL, marginTop: 2 }}>
                      {c.platform} · {c.type} · Spend {fmt$(c.spend)}
                    </div>
                  </div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: CORAL, flexShrink: 0, marginLeft: 12 }}>
                    {fmtROAS(c.roas)}
                  </div>
                </div>
              ))}
            </div>
          )}
          {toPause.length > 0 && (
            <div style={{ marginTop: 12, background: 'rgba(248,113,113,0.08)', borderRadius: 8, padding: '10px 12px', fontSize: 11, color: MUTED, lineHeight: 1.6 }}>
              <strong style={{ color: CORAL }}>YouTube - Brand Awareness</strong> generated only 3 conversions on $2,609 spend (0.11x ROAS). Pause immediately and reallocate budget to Meta top performers or Google Shopping (4.32x).
            </div>
          )}
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 11, color: DIM, fontWeight: 600, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
              Monitor (ROAS 1–3x)
            </div>
            {allCampaigns.filter(c => c.roas >= 1 && c.roas <= 3).map(c => (
              <div key={c.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '5px 0', borderBottom: `1px solid #16162a`, fontSize: 12 }}>
                <span style={{ color: MUTED }}>{c.name}</span>
                <span style={{ color: AMBER, fontWeight: 600 }}>{fmtROAS(c.roas)}</span>
              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CampaignDashboard/>);
</script>
</body>
</html>
