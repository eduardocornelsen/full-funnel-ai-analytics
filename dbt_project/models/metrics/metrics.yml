metrics:
  # ── Simple metrics (aggregate a single measure) ──────────────────────────────
  - name: total_revenue
    label: Total Revenue
    description: Sum of all attributed order revenue
    type: simple
    type_params:
      measure: revenue

  - name: total_spend
    label: Total Ad Spend
    description: Sum of all paid media spend (Google Ads + Meta Ads)
    type: simple
    type_params:
      measure: total_spend

  - name: total_sessions
    label: Total Sessions
    description: All web sessions across channels from GA4
    type: simple
    type_params:
      measure: sessions

  - name: total_clicks
    label: Total Ad Clicks
    description: >
      Sum of all paid ad clicks (Google Ads + Meta Ads).
      Use as denominator for click-based CVR (platform campaigns only).
      Do NOT use as CVR denominator for cross-channel comparisons — use total_sessions.
      See session_conversion_rate for the canonical cross-channel CVR definition.
    type: simple
    type_params:
      measure: total_clicks

  - name: total_new_users
    label: Total New Users (Leads)
    description: First-time visitors — top-of-funnel lead proxy
    type: simple
    type_params:
      measure: new_users

  - name: total_engaged_sessions
    label: Total Engaged Sessions
    description: Sessions with meaningful user engagement
    type: simple
    type_params:
      measure: engaged_sessions

  - name: total_orders
    label: Total Orders
    description: Count of distinct completed orders
    type: simple
    type_params:
      measure: order_count

  - name: average_order_value
    label: Average Order Value (AOV)
    description: Mean revenue per order
    type: simple
    type_params:
      measure: avg_order_value

  - name: total_pipeline_value
    label: Total Pipeline Value
    description: Sum of all deal amounts across HubSpot and Salesforce
    type: simple
    type_params:
      measure: pipeline_value

  - name: total_deals
    label: Total Deals / Opportunities
    description: Count of all CRM deals and opportunities
    type: simple
    type_params:
      measure: deal_count

  - name: channel_spend
    label: Channel Ad Spend
    description: Spend broken down by paid channel
    type: simple
    type_params:
      measure: channel_spend

  - name: channel_revenue
    label: Channel Attributed Revenue
    description: >
      Revenue attributed to each paid channel using linear attribution
      (equal credit to all touchpoints in the conversion path).
      Attribution window: matches query date range (default 90 days).
      Source: fct_marketing_attribution.linear_revenue.
      Compare to first_touch_revenue and last_touch_revenue for model sensitivity.
    type: simple
    type_params:
      measure: channel_revenue

  - name: channel_orders
    label: Channel Orders
    description: Orders attributed to each paid channel
    type: simple
    type_params:
      measure: channel_orders

  # ── Derived metrics (computed from simple metrics) ───────────────────────────
  - name: blended_roas
    label: Blended ROAS
    description: >
      Total attributed revenue divided by total paid media spend (Google Ads + Meta Ads).
      Attribution model: linear (equal credit split across all touchpoints in the path).
      Attribution window: configurable; default query period is 90 days.
      Revenue scope: GA4-attributed paid-channel orders only.
      Formula: total_revenue / total_spend.
      NOTE: Will differ from platform-reported ROAS (Meta/Google native) which use
      last-click attribution within their own 7-day or 28-day windows.
    type: derived
    type_params:
      expr: "total_revenue / total_spend"
      metrics:
        - name: total_revenue
        - name: total_spend

  - name: channel_roas
    label: Channel ROAS
    description: Channel revenue divided by channel spend
    type: derived
    type_params:
      expr: "channel_revenue / channel_spend"
      metrics:
        - name: channel_revenue
        - name: channel_spend

  - name: customer_acquisition_cost
    label: Customer Acquisition Cost (CAC)
    description: Total ad spend divided by number of orders
    type: derived
    type_params:
      expr: "channel_spend / channel_orders"
      metrics:
        - name: channel_spend
        - name: channel_orders

  - name: cost_per_session
    label: Cost Per Session
    description: Total spend divided by total paid sessions
    type: derived
    type_params:
      expr: "total_spend / total_sessions"
      metrics:
        - name: total_spend
        - name: total_sessions

  - name: engagement_rate
    label: Engagement Rate
    description: Share of sessions that were meaningfully engaged
    type: derived
    type_params:
      expr: "total_engaged_sessions / total_sessions"
      metrics:
        - name: total_engaged_sessions
        - name: total_sessions

  - name: session_conversion_rate
    label: Session to Order Conversion Rate
    description: >
      CANONICAL CVR DEFINITION for this project.
      Formula: total_orders / total_sessions (GA4 sessions as denominator).
      Use this metric for all cross-channel funnel and campaign analysis.
      WARNING: Platform-reported CVR (Google Ads, Meta Ads) uses clicks as the
      denominator — values will be 2-4x higher and are NOT comparable to this metric.
      Label as "Session CVR" in UI; label platform CVR as "Click CVR".
    type: derived
    type_params:
      expr: "total_orders / total_sessions"
      metrics:
        - name: total_orders
        - name: total_sessions
